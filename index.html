        function getDeadlineColor(deadline, status) {
          if (status === 'Closed') return 'deadline-gray';
          const today = new Date('2026-04-17');
          const deadlineDate = new Date(deadline);
          const daysUntil = Math.ceil((deadlineDate - today) / (1000 * 60 * 60 * 24));
          if (daysUntil < 14) return 'deadline-red';
          if (daysUntil < 30) return 'deadline-orange';
          return 'deadline-green';
        }

        function formatDate(dateStr) {
          const date = new Date(dateStr);
          return date.toLocaleDateString('en-US', { year: 'numeric', month: 'short', day: 'numeric' });
        }

        function daysUntilDeadline(deadline) {
          const today = new Date('2026-04-17');
          const deadlineDate = new Date(deadline);
          return Math.ceil((deadlineDate - today) / (1000 * 60 * 60 * 24));
        }

        function FundingDashboard() {
          const [filters, setFilters] = React.useState({
            search: '',
            status: ['Open', 'Upcoming', 'Continuous'],
            funderCategory: [],
            type: [],

            deadlineRange: 'all',
            budgetMin: 0,
            budgetMax: 10000000
          });

          const [viewMode, setViewMode] = React.useState('card');
          const [sortBy, setSortBy] = React.useState('deadline');
          const [showFilters, setShowFilters] = React.useState(true);
          const [expandedCard, setExpandedCard] = React.useState(null);

          const filteredData = React.useMemo(() => {
            let result = fundingData;

            // Search filter
            if (filters.search) {
              const search = filters.search.toLowerCase();
              result = result.filter(item =>
                item.name.toLowerCase().includes(search) ||
                item.funder.toLowerCase().includes(search) ||
                item.description.toLowerCase().includes(search) ||
                item.relevanceTags.some(tag => tag.toLowerCase().includes(search))
              );
            }

            // Status filter
            if (filters.status.length > 0) {
              result = result.filter(item => filters.status.includes(item.status));
            }

            // Funder category filter
            if (filters.funderCategory.length > 0) {
              result = result.filter(item => filters.funderCategory.includes(item.funderCategory));
            }

            // Type filter
            if (filters.type.length > 0) {
              result = result.filter(item => filters.type.includes(item.type));
            }

            // Career stage filter
            if (filters.careerStage.length > 0) {
              result = result.filter(item =>
                item.careerStage.some(stage => filters.careerStage.includes(stage))
              );
            }

            // Deadline range filter
            if (filters.deadlineRange !== 'all') {
              const today = new Date('2026-04-17');
              result = result.filter(item => {
                const deadlineDate = new Date(item.deadline);
                const days = Math.ceil((deadlineDate - today) / (1000 * 60 * 60 * 24));
                if (filters.deadlineRange === '30') return days > 0 && days <= 30;
                if (filters.deadlineRange === '60') return days > 0 && days <= 60;
                if (filters.deadlineRange === '90') return days > 0 && days <= 90;
                return true;
              });
            }

            // Budget range filter
            result = result.filter(item =>
              item.budgetMax >= filters.budgetMin && item.budgetMin <= filters.budgetMax
            );

            // Sorting
            if (sortBy === 'deadline') {
              result.sort((a, b) => new Date(a.deadline) - new Date(b.deadline));
            } else if (sortBy === 'budget-high') {
              result.sort((a, b) => b.budgetMax - a.budgetMax);
            } else if (sortBy === 'funder') {
              result.sort((a, b) => a.funder.localeCompare(b.funder));
            } else if (sortBy === 'recent') {
              result.sort((a, b) => new Date(b.dateAdded) - new Date(a.dateAdded));

            return result;

              return d.status !== 'Closed' && daysUntil > 0 && daysUntil <= 30;
            }).length,
            new30: fundingData.filter(d => {
              const today = new Date('2026-04-17');
              const addedDate = new Date(d.dateAdded);
              return (today - addedDate) / (1000 * 60 * 60 * 24) <= 30;
            }).length,
            prizes: fundingData.filter(d => d.type === 'Prize/Stipend').length
          };

          const prizeItems = React.useMemo(() => {
            return fundingData
              .filter(d => d.type === 'Prize/Stipend')
              .sort((a, b) => new Date(a.deadline) - new Date(b.deadline));
          }, []);

          const isPrizeFilterActive = filters.type.length === 1 && filters.type[0] === 'Prize/Stipend';

          const handleTogglePrizeFilter = () => {
            if (isPrizeFilterActive) {
              setFilters({...filters, type: []});
            } else {
              setFilters({...filters, type: ['Prize/Stipend']});
              // scroll to results
              setTimeout(() => {
                const el = document.getElementById('results-section');
                if (el) el.scrollIntoView({behavior: 'smooth', block: 'start'});
              }, 50);
            }
          };

          const handleClearFilters = () => {
            setFilters({
              search: '',
              status: [],
              funderCategory: [],
              type: [],
              careerStage: [],
              deadlineRange: 'all',
              budgetMin: 0,
              budgetMax: 10000000
            });
          };
          const handleExportCSV = () => {
            const headers = ['Funder', 'Name', 'Type', 'Status', 'Deadline', 'Budget (EUR)', 'Career Stage', 'URL'];
            const rows = filteredData.map(item => [
              item.funder,
              item.name,
              item.type,
              item.status,
              item.deadline,
              `${item.budgetMin}-${item.budgetMax}`,
              item.careerStage.join('; '),
              item.url
            ]);

            const csv = [headers, ...rows].map(row =>
              row.map(cell => `"${String(cell).replace(/"/g, '""')}"`).join(',')
            ).join('\n');

            const blob = new Blob([csv], { type: 'text/csv' });
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'funding-opportunities.csv';
            a.click();
          };

          return (
            <div className="min-h-screen bg-gray-50">
              {/* Header */}
              <div>
                {/* Hero image */}
                <div style={{position: 'relative', overflow: 'hidden', maxHeight: '220px'}}>
                  <img
                    src="https://www.uu.nl/sites/default/files/Pharmacoepidemiology%20and%20Clinical%20Pharmacology_Utrecht%20University.png"
                    alt="Pharmacoepidemiology and Clinical Pharmacology"
                    style={{width: '100%', objectFit: 'cover', objectPosition: 'center', display: 'block'}}
                  />
                </div>
                {/* Yellow title bar — matches UU division style */}
                <div className="uu-yellow-bg px-6 py-4">
                  <div className="max-w-7xl mx-auto flex items-center justify-between flex-wrap gap-2">
                    <div>
                      <h1 className="text-2xl font-bold text-black tracking-tight">Pharmacoepidemiology and Clinical Pharmacology</h1>
                      <p className="text-sm text-black opacity-75 mt-0.5">Utrecht University — Funding Watch</p>
                    </div>
                    <p className="text-xs text-black opacity-60">Last updated: April 17, 2026 — Prizes & Student Funds rubric added</p>
                  </div>
                </div>
              </div>

              {/* Quick Deadlines */}
              {upcomingDeadlines.length > 0 && (
                <div className="max-w-7xl mx-auto px-4 py-6 bg-blue-50 border-b border-blue-200">
                  <h3 className="font-bold text-blue-900 mb-3">Next 5 Upcoming Deadlines</h3>
                  <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-5 gap-3">
                    {upcomingDeadlines.map(item => (
                      <div key={item.id} className="bg-white p-3 rounded-lg border border-blue-200">
                        <div className="text-xs font-semibold text-blue-900">{item.funder}</div>
                        <div className="text-xs text-gray-600 mt-1 line-clamp-2">{item.name}</div>
                        <div className={`text-sm font-bold mt-2 ${getDeadlineColor(item.deadline, item.status)}`}>
                          {formatDate(item.deadline)}
                        </div>
                        <div className="text-xs text-gray-500">{item.daysUntil} days</div>
                      </div>
                    ))}
                  </div>
                </div>
              )}

              {/* Prizes & Student Funds – dedicated rubric */}
              {prizeItems.length > 0 && (
                <div className="max-w-7xl mx-auto px-4 py-6 bg-yellow-50 border-b border-yellow-200">
                  <div className="flex items-center justify-between flex-wrap gap-3 mb-3">
                    <div>
                      <h3 className="font-bold text-yellow-900 text-lg">
                        🏆 Prizes &amp; Student/PhD Funds
                      </h3>
                      <p className="text-xs text-yellow-900 opacity-80 mt-1">
                        Thesis prizes, dissertation awards and stipends for master students and PhDs — Dutch and international.
                      </p>
                    </div>
                    <button
                      onClick={handleTogglePrizeFilter}
                      className={`px-4 py-2 rounded text-sm font-semibold transition ${
                        isPrizeFilterActive
                          ? 'bg-gray-700 text-white hover:bg-gray-800'
                          : 'uu-yellow-bg text-black hover:brightness-95'
                      }`}
                    >
                      {isPrizeFilterActive
                        ? 'Show all opportunities'
                        : `Show only Prizes & Student Funds (${prizeItems.length})`}
                    </button>
                  </div>
                  <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-3">
                    {prizeItems.slice(0, 6).map(item => (
                      <a
                        key={item.id}
                        href={item.url}
                        target="_blank"
                        rel="noopener noreferrer"
                        className="bg-white p-3 rounded-lg border border-yellow-300 hover:shadow-md transition block"
                      >
                        <div className="text-xs font-semibold text-yellow-900">{item.funder}</div>
                        <div className="text-xs text-gray-800 mt-1 font-bold line-clamp-2">{item.name}</div>
                        <div className="flex justify-between items-center mt-2">
                          <span className="text-xs text-gray-600">
                            {item.careerStage.join(', ')}
                          </span>
                          <span className="text-xs font-semibold text-gray-700">
                            €{(item.budgetMin/1000).toFixed(1)}k–{(item.budgetMax/1000).toFixed(1)}k
                          </span>
                        </div>
                        <div className={`text-xs font-bold mt-1 ${getDeadlineColor(item.deadline, item.status)}`}>
                          {item.status === 'Closed' ? 'Closed' : formatDate(item.deadline)}
                        </div>
                      </a>
                    ))}
                  </div>
                  {prizeItems.length > 6 && (
                    <p className="text-xs text-yellow-900 opacity-75 mt-3">
                      +{prizeItems.length - 6} more prizes/stipends — click the button above to filter the full list.
                    </p>
                  )}
                </div>
              )}

              {/* Stats Bar */}
              <div className="max-w-7xl mx-auto px-4 py-6 grid grid-cols-2 md:grid-cols-5 gap-4">
                <div className="bg-white p-4 rounded-lg shadow">
                  <div className="text-gray-500 text-sm">Total Opportunities</div>
                  <div className="text-3xl font-bold uu-yellow">{stats.total}</div>
                </div>
                <div className="bg-white p-4 rounded-lg shadow">
                  <div className="text-gray-500 text-sm">Currently Open</div>
                  <div className="text-3xl font-bold text-green-600">{stats.open}</div>
                </div>
                <div className="bg-white p-4 rounded-lg shadow">
                  <div className="text-gray-500 text-sm">Deadline &lt;30 Days</div>
                  <div className="text-3xl font-bold text-orange-600">{stats.upcoming30}</div>
                </div>
                <div className="bg-white p-4 rounded-lg shadow">
                  <div className="text-gray-500 text-sm">Added (Last 30 Days)</div>
                  <div className="text-3xl font-bold text-blue-600">{stats.new30}</div>
                </div>
                <div
                  className="bg-white p-4 rounded-lg shadow cursor-pointer hover:shadow-md transition"
                  onClick={handleTogglePrizeFilter}
                  title="Click to filter to prizes & student funds only"
                >
                  <div className="text-gray-500 text-sm">Prizes &amp; Student Funds</div>
                  <div className="text-3xl font-bold text-yellow-600">{stats.prizes}</div>
                </div>
              </div>

              {/* Controls Bar */}
              <div className="max-w-7xl mx-auto px-4 py-4 flex flex-wrap gap-3 items-center justify-between bg-white border-b">
                <div className="flex gap-2">
                  <button
                    onClick={() => setViewMode('card')}
                    className={`px-4 py-2 rounded font-semibold text-sm transition ${viewMode === 'card' ? 'uu-yellow-bg text-black' : 'bg-gray-200 text-gray-700'}`}
                  >
                    Card View
                  </button>
                  <button
                    onClick={() => setViewMode('table')}
                    className={`px-4 py-2 rounded font-semibold text-sm transition ${viewMode === 'table' ? 'uu-yellow-bg text-black' : 'bg-gray-200 text-gray-700'}`}
                  >
                    Table View
                  </button>
                </div>

                <div className="flex gap-2">
                  <select
                    value={sortBy}
                    onChange={(e) => setSortBy(e.target.value)}
                    className="px-3 py-2 border border-gray-300 rounded text-sm"
                  >
                    <option value="deadline">Sort by Deadline</option>
                    <option value="budget-high">Sort by Budget (High)</option>
                    <option value="funder">Sort by Funder</option>
                    <option value="recent">Sort by Recent</option>
                  </select>
                  <button
                    onClick={handleExportCSV}
                    className="px-4 py-2 bg-gray-700 text-white rounded text-sm hover:bg-gray-800"
                  >
                    Export CSV
                  </button>
                  <button
                    onClick={() => setShowFilters(!showFilters)}
                    className="px-4 py-2 bg-gray-500 text-white rounded text-sm hover:bg-gray-600"
                  >
                    {showFilters ? 'Hide' : 'Show'} Filters
                  </button>
                </div>
              </div>

              {/* Filters Panel */}
              {showFilters && (
                <div className="max-w-7xl mx-auto px-4 py-6 bg-gray-100">
                  <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
                    {/* Search */}
                    <div>
                      <label className="block text-sm font-semibold text-gray-700 mb-2">Search</label>
                      <input
                        type="text"
                        placeholder="Search by name, funder, keywords..."
                        value={filters.search}
                        onChange={(e) => setFilters({...filters, search: e.target.value})}
                        className="w-full px-3 py-2 border border-gray-300 rounded"
                      />
                    </div>

                    {/* Status */}
                    <div>
                      <label className="block text-sm font-semibold text-gray-700 mb-2">Status</label>
                      <div className="space-y-1">
                        {['Open', 'Upcoming', 'Continuous', 'Closed'].map(status => (
                          <label key={status} className="flex items-center text-sm">
                            <input
                              type="checkbox"
                              checked={filters.status.includes(status)}
                              onChange={(e) => {
                                if (e.target.checked) {
                                  setFilters({...filters, status: [...filters.status, status]});
                                } else {
                                  setFilters({...filters, status: filters.status.filter(s => s !== status)});
                                }
                              }}
                              className="mr-2"
                            />
                            {status}
                          </label>
                        ))}
                      </div>
                    </div>

                    {/* Funder Category */}
                    <div>
                      <label className="block text-sm font-semibold text-gray-700 mb-2">Funder Category</label>
                      <div className="space-y-1">
                        {['Dutch National', 'European', 'International', 'Private/Foundation'].map(cat => (
                          <label key={cat} className="flex items-center text-sm">
                            <input
                              type="checkbox"
                              checked={filters.funderCategory.includes(cat)}
                              onChange={(e) => {
                                if (e.target.checked) {
                                  setFilters({...filters, funderCategory: [...filters.funderCategory, cat]});
                                } else {
                                  setFilters({...filters, funderCategory: filters.funderCategory.filter(c => c !== cat)});
                                }
                              }}
                              className="mr-2"
                            />
                            {cat}
                          </label>
                        ))}
                      </div>
                    </div>

                    {/* Type */}
                    <div>
                      <label className="block text-sm font-semibold text-gray-700 mb-2">Type</label>
                      <div className="space-y-1">
                        {['Project Grant', 'Personal Fellowship', 'PhD Position', 'Network/Consortium', 'Travel/Mobility', 'Infrastructure', 'Prize/Stipend'].map(type => (
                          <label key={type} className="flex items-center text-sm">
                            <input
                              type="checkbox"
                              checked={filters.type.includes(type)}
                              onChange={(e) => {
                                if (e.target.checked) {
                                  setFilters({...filters, type: [...filters.type, type]});
                                } else {
                                  setFilters({...filters, type: filters.type.filter(t => t !== type)});
                                }
                              }}
                              className="mr-2"
                            />
                            {type}
                          </label>
                        ))}
                      </div>
                    </div>

                    {/* Career Stage */}
                    <div>
                      <label className="block text-sm font-semibold text-gray-700 mb-2">Career Stage</label>
                      <div className="space-y-1">
                        {['Master', 'PhD', 'Postdoc', 'Early Career', 'Mid Career', 'Senior/PI'].map(stage => (
                          <label key={stage} className="flex items-center text-sm">
                            <input
                              type="checkbox"
                              checked={filters.careerStage.includes(stage)}
                              onChange={(e) => {
                                if (e.target.checked) {
                                  setFilters({...filters, careerStage: [...filters.careerStage, stage]});
                                } else {
                                  setFilters({...filters, careerStage: filters.careerStage.filter(s => s !== stage)});
                                }
                              }}
                              className="mr-2"
                            />
                            {stage}
                          </label>
                        ))}
                      </div>
                    </div>

                    {/* Deadline Range */}
                    <div>
                      <label className="block text-sm font-semibold text-gray-700 mb-2">Deadline Range</label>
                      <select
                        value={filters.deadlineRange}
                        onChange={(e) => setFilters({...filters, deadlineRange: e.target.value})}
                        className="w-full px-3 py-2 border border-gray-300 rounded"
                      >
                        <option value="all">All deadlines</option>
                        <option value="30">Next 30 days</option>
                        <option value="60">Next 60 days</option>
                        <option value="90">Next 90 days</option>
                      </select>
                    </div>
                  </div>

                  <div className="mt-4">
                    <button
                      onClick={handleClearFilters}
                      className="px-4 py-2 bg-red-500 text-white rounded hover:bg-red-600 text-sm font-semibold"
                    >
                      Clear All Filters
                    </button>
                  </div>
                </div>
              )}

              {/* Main Content */}
              <div id="results-section" className="max-w-7xl mx-auto px-4 py-6">
                <p className="text-gray-600 mb-4">Showing {filteredData.length} opportunities</p>

                {filteredData.length === 0 ? (
                  <div className="bg-white p-12 rounded-lg text-center">
                    <p className="text-gray-500 text-lg">No funding opportunities match your filters.</p>
                    <button
                      onClick={handleClearFilters}
                      className="mt-4 px-4 py-2 uu-yellow-bg text-black rounded font-semibold"
                    >
                      Clear filters
                    </button>
                  </div>
                ) : viewMode === 'card' ? (
                  <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                    {filteredData.map(item => (
                      <div key={item.id} className="card-hover bg-white rounded-lg shadow p-6 border-l-4 border-gray-300">
                        {/* Header */}
                        <div className="flex justify-between items-start mb-3">
                          <div>
                            <div className="text-xs font-semibold text-gray-500">{item.funder}</div>
                            <h3 className="font-bold text-gray-800 text-sm mt-1">{item.name}</h3>
                          </div>
                          <span className={`text-xs font-bold px-2 py-1 rounded ${STATUS_COLORS[item.status]}`}>
                            {item.status}
                          </span>
                        </div>

                        {/* Details Grid */}
                        <div className="grid grid-cols-2 gap-3 mb-3 text-xs">
                          <div>
                            <span className="text-gray-500">Type:</span>
                            <div className="font-semibold text-gray-800">{item.type}</div>
                          </div>
                          <div>
                            <span className="text-gray-500">Budget:</span>
                            <div className="font-semibold text-gray-800">€{(item.budgetMin/1000).toFixed(0)}k-{(item.budgetMax/1000).toFixed(0)}k</div>
                          </div>
                          <div>
                            <span className="text-gray-500">Deadline:</span>
                            <div className={`font-bold ${getDeadlineColor(item.deadline, item.status)}`}>
                              {formatDate(item.deadline)}
                            </div>
                          </div>
                          <div>
                            <span className="text-gray-500">Career Stage:</span>
                            <div className="font-semibold text-gray-800">{item.careerStage.join(', ')}</div>
                          </div>
                        </div>

                        {/* Tags */}
                        <div className="flex flex-wrap gap-1 mb-3">
                          {item.relevanceTags.slice(0, 3).map((tag, idx) => (
                            <span key={idx} className="text-xs bg-yellow-100 text-yellow-800 px-2 py-1 rounded">
                              {tag}
                            </span>
                          ))}
                          {item.relevanceTags.length > 3 && (
                            <span className="text-xs text-gray-500">+{item.relevanceTags.length - 3} more</span>
                          )}
                        </div>

                        {/* Description */}
                        <p className="text-xs text-gray-600 mb-3">{item.description.substring(0, 100)}...</p>

                        {/* Action Button */}
                        <div className="flex gap-2">
                          <a
                            href={item.url}
                            target="_blank"
                            rel="noopener noreferrer"
                            className="flex-1 bg-blue-600 text-white px-3 py-2 rounded text-xs font-semibold hover:bg-blue-700 text-center"
                          >
                            View Full Call
                          </a>
                          <button
                            onClick={() => setExpandedCard(expandedCard === item.id ? null : item.id)}
                            className="bg-gray-200 text-gray-800 px-3 py-2 rounded text-xs font-semibold hover:bg-gray-300"
                          >
                            {expandedCard === item.id ? '−' : '+'}
                          </button>
                        </div>

                        {/* Expanded Info */}
                        {expandedCard === item.id && (
                          <div className="mt-4 pt-4 border-t border-gray-200 text-xs space-y-2">
                            <div>
                              <span className="font-semibold text-gray-700">Full Description:</span>
                              <p className="text-gray-600">{item.description}</p>
                            </div>
                            <div>
                              <span className="font-semibold text-gray-700">Phase Type:</span>
                              <p className="text-gray-600">{item.phaseType}</p>
                            </div>
                            <div>
                              <span className="font-semibold text-gray-700">Mandatory Partners:</span>
                              <p className="text-gray-600">{item.mandatoryPartners ? `Yes - ${item.mandatoryPartnersDesc}` : 'No'}</p>
                            </div>
                            <div>
                              <span className="font-semibold text-gray-700">Recurring:</span>
                              <p className="text-gray-600">{item.recurring}</p>
                            </div>
                            <div>
                              <span className="font-semibold text-gray-700">All Tags:</span>
                              <div className="flex flex-wrap gap-1 mt-1">
                                {item.relevanceTags.map((tag, idx) => (
                                  <span key={idx} className="bg-yellow-100 text-yellow-800 px-2 py-1 rounded">
                                    {tag}
                                  </span>
                                ))}
                              </div>
                            </div>
                          </div>
                        )}
                      </div>
                    ))}
                  </div>
                ) : (
                  <div className="bg-white rounded-lg shadow overflow-x-auto">
                    <table className="w-full text-sm">
                      <thead className="uu-dark text-white">
                        <tr>
                          <th className="px-4 py-3 text-left">Funder</th>
                          <th className="px-4 py-3 text-left">Name</th>
                          <th className="px-4 py-3 text-left">Type</th>
                          <th className="px-4 py-3 text-left">Status</th>
                          <th className="px-4 py-3 text-left">Deadline</th>
                          <th className="px-4 py-3 text-right">Budget (EUR)</th>
                          <th className="px-4 py-3 text-left">Career Stage</th>
                          <th className="px-4 py-3 text-center">Action</th>
                        </tr>
                      </thead>
                      <tbody>
                        {filteredData.map((item, idx) => (
                          <tr key={item.id} className={idx % 2 === 0 ? 'bg-gray-50' : 'bg-white'}>
                            <td className="px-4 py-3 font-semibold text-gray-700">{item.funder}</td>
                            <td className="px-4 py-3 text-gray-700">{item.name}</td>
                            <td className="px-4 py-3 text-gray-600">{item.type}</td>
                            <td className="px-4 py-3">
                              <span className={`text-xs font-bold px-2 py-1 rounded ${STATUS_COLORS[item.status]}`}>
                                {item.status}
                              </span>
                            </td>
                            <td className={`px-4 py-3 font-semibold ${getDeadlineColor(item.deadline, item.status)}`}>
                              {formatDate(item.deadline)}
                            </td>
                            <td className="px-4 py-3 text-right">€{(item.budgetMin/1000).toFixed(0)}k-{(item.budgetMax/1000).toFixed(0)}k</td>
                            <td className="px-4 py-3 text-gray-600 text-xs">{item.careerStage.join(', ')}</td>
                            <td className="px-4 py-3 text-center">
                              <a
                                href={item.url}
                                target="_blank"
                                rel="noopener noreferrer"
                                className="text-blue-600 hover:text-blue-800 font-semibold"
                              >
                                View
                              </a>
                            </td>
                          </tr>
                        ))}
                      </tbody>
                    </table>
                  </div>
                )}
              </div>

              {/* Footer */}
              <div className="uu-dark text-gray-300 py-8 mt-12">
                <div className="max-w-7xl mx-auto px-4 text-center text-sm">
                  <p className="mb-2">Funding Watch - Division of Pharmacoepidemiology & Clinical Pharmacology</p>
                  <p>Utrecht University | Data Last Updated: April 17, 2026 — Prizes & Student Funds rubric added</p>
                </div>
              </div>
            </div>
          );
        }

        ReactDOM.createRoot(document.getElementById('root')).render(<FundingDashboard />);
      </script>
    </div>
  </body>
</html>
